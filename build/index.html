<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fff8eb" />

    <title>Klikkertréning – Baráthegyis önkénteseknek</title>
    <meta
      name="description"
      content="Rövid gyakorló játék önkénteseknek: helyedre-maradj tréning kutyával."
    />
    <meta
      property="og:title"
      content="Klikkertréning – Baráthegyis önkénteseknek"
    />
    <meta
      property="og:description"
      content="Interaktív gyakorló játék önkénteseknek."
    />
    <script>
      (() => {
        const storageKey = "clicker-theme";
        let storedTheme = null;

        try {
          storedTheme = localStorage.getItem(storageKey);
        } catch {
          storedTheme = null;
        }

        const theme =
          storedTheme === "dark" || storedTheme === "light"
            ? storedTheme
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";

        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;

        try {
          localStorage.setItem(storageKey, theme);
        } catch {
          /* Ignore unavailable localStorage. */
        }
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" crossorigin src="./assets/index-DQAAZtez.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-PQobm4yA.css">
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
